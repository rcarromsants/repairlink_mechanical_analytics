version: 2

models:
  - name: dim_dealer
    description: >
      Dealer dimension table. One row per dealer, Type 1 (current state only).
      Surrogate key generated from dealer_id.
    columns:
      - name: dealer_key
        description: Surrogate key. MD5 hash of dealer_id.
        tests: [not_null, unique]
      - name: dealer_id
        description: Natural key for the dealer.
        tests: [not_null]
      - name: status_id
        description: Current trial status code for the dealer.
      - name: trial_started_at
        description: When the dealer trial started.
      - name: trial_ended_at
        description: When the dealer trial ended. Null if still active.
      - name: is_active
        description: True if the dealer trial is currently active (trial_ended_at is null).
      - name: created_at
        description: Record creation timestamp.
      - name: updated_at
        description: Record last updated timestamp.

  - name: dim_shop
    description: >
      Shop dimension table. One row per shop, Type 1 (current state only).
      Surrogate key generated from shop_id.
    columns:
      - name: shop_key
        description: Surrogate key. MD5 hash of shop_id.
        tests: [not_null, unique]
      - name: shop_id
        description: Natural key for the shop.
        tests: [not_null]
      - name: location_code
        description: Location code associated with the shop.
      - name: order_type
        description: Order type configured for the shop.
      - name: created_at
        description: Record creation timestamp.
      - name: updated_at
        description: Record last updated timestamp.
