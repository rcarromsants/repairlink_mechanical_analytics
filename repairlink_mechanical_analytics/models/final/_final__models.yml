version: 2

models:

  - name: dim_dealer
    description: >
      Comprehensive dealer entity dataset.
      One row per dealer (11-char canonical dealer_id).
      The dealer universe is the union of all distinct dealer_ids across
      dealertrial, dealer_mapper (both ends), and dealeroemenrollment.
      Enriched with OEM enrollment counts and the latest contact /
      organisational information.
      See dim_dealer_trial for dealer trial lifecycle context.

    columns:
      - name: dealer_id
        description: 11-char canonical dealer identifier.
        tests: [not_null]

      - name: total_oem_count
        description: Total OEM enrollments (active + inactive) for this dealer.

      - name: active_oem_count
        description: Currently active OEM enrollments.

      - name: contact_type_id
        description: Contact type associated with the enriched contact row.

      - name: org_name
        description: Organisation name from contact enrichment.

      - name: first_name
        description: Primary contact first name.

      - name: last_name
        description: Primary contact last name.

      - name: email

      - name: phone_business

      - name: phone_mobile

      - name: address_line_1

      - name: address_line_2
        description: Normalised address line 2.

      - name: city
        description: City.

      - name: state
        description: State / province code.

      - name: postal_code

      - name: country_code
        description: ISO 3166-1 alpha-2 country code.



  - name: dim_dealer_trial
    description: >
      Dealer trial lifecycle dataset.
      One row per dealer with trial activity.
      Holds the latest lifecycle/business-status context for dealers
      that have a trial record.
      dealer_id_full preserves the original 15-char source identifier.

    columns:
      - name: dealer_trial_id
        description: Source primary key.

      - name: dealer_id
        description: 11-char canonical dealer identifier.

      - name: dealer_id_full
        description: Original 15-char dealer identifier from source.

      - name: status_id
        description: Trial status identifier.

      - name: trial_started_at
        description: Timestamp when the dealer trial started.

      - name: trial_ended_at
        description: Timestamp when the dealer trial ended.

      - name: is_active
        description: Indicates whether the dealer trial is currently active.

      - name: created_at
        description: Source record creation timestamp.

      - name: updated_at
        description: Source record last update timestamp.

      - name: ingested_at
        description: Timestamp when the record was ingested.



  - name: dim_vehicle
    description: >
      Vehicle entity dataset enriched with VIN intelligence attributes.

    columns:
      - name: vin
        description: Vehicle VIN identifier.
        tests: [not_null]

      - name: vehicle_id
        description: Source vehicle identifier.

      - name: transaction_id
        description: Associated transaction identifier.

      - name: vehicle_type_id
        description: Vehicle type identifier.

      - name: status_id
        description: Vehicle status identifier.

      - name: vehicle_year
        description: Vehicle model year.

      - name: vehicle_make
        description: Original RepairLink vehicle make.

      - name: vehicle_model
        description: Original RepairLink vehicle model.

      - name: vin_vintelligence
        description: VIN returned from VIN intelligence enrichment.

      - name: vin_decoded_correctly
        description: Indicates whether VIN decoding was successful.

      - name: created_at
        description: Source record creation timestamp.

      - name: updated_at
        description: Source record last update timestamp.

      - name: ingested_at
        description: Timestamp when the record was ingested.



  - name: dim_shop
    description: >
      Shop entity dataset enriched with organisational and contact information.

    columns:
      - name: shop_id
        description: Source shop identifier.
        tests: [not_null]

      - name: org_name
        description: Organisation name.

      - name: first_name
        description: Primary contact first name.

      - name: last_name
        description: Primary contact last name.

      - name: email
        description: Primary contact email address.

      - name: city
        description: City.

      - name: state
        description: State / province code.

      - name: country_code
        description: ISO country code.

      - name: website
        description: Shop website URL.

      - name: created_at
        description: Source record creation timestamp.

      - name: updated_at
        description: Source record last update timestamp.



  - name: dim_manufacturer
    description: >
      Manufacturer entity dataset used for RepairLink enrichment.

    columns:
      - name: manufacturer_id
        description: Manufacturer identifier from RepairLink.
        tests: [not_null]

      - name: manufacturer_name_long
        description: Long manufacturer display name.

      - name: manufacturer_name_short
        description: Short manufacturer display name.

      - name: abbreviation
        description: Manufacturer abbreviation.

      - name: manufacturer_business_key
        description: Source manufacturer business identifier.

      - name: org_key
        description: Source organisation key.

      - name: industry_id
        description: Industry identifier.

      - name: is_phoenix_published_inv
        description: Indicates whether Phoenix inventory is published.

      - name: ingested_at
        description: Timestamp when the record was ingested.



  - name: bridge_dealer_distance
    description: >
      Dealer-to-dealer distance relationship bridge table.

    columns:
      - name: from_dealer_id
        description: Source dealer identifier.

      - name: to_dealer_id
        description: Connected dealer identifier.

      - name: group_id
        description: Dealer group identifier.

      - name: distance_km
        description: Distance between dealers in kilometers.

      - name: status
        description: Relationship status.

      - name: created_at
        description: Source record creation timestamp.

      - name: updated_at
        description: Source record last update timestamp.

      - name: ingested_at
        description: Timestamp when the record was ingested.



  - name: bridge_dealer_oem
    description: >
      Dealer-to-OEM enrollment bridge table.

    columns:
      - name: dealer_oem_enrollment_id
        description: Enrollment record identifier.

      - name: dealer_id
        description: 11-char canonical dealer identifier.

      - name: dealer_id_full
        description: Original 15-char dealer identifier from source.

      - name: oem_id
        description: OEM identifier.

      - name: oem_name
        description: OEM display name.

      - name: is_active
        description: Indicates whether the OEM enrollment is active.

      - name: enrolled_at
        description: Enrollment creation timestamp.

      - name: updated_at
        description: Source record last update timestamp.

      - name: ingested_at
        description: Timestamp when the record was ingested.