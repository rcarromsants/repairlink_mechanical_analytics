version: 2

models:
  - name: int_repairlink__dealer
    description: >
      Comprehensive dealer entity. One row per dealer_id (11-char canonical form),
      built from the union of every dealer-source table: stg_repairlink__dealertrial,
      stg_repairlink__dealer_mapper (both ends), and stg_repairlink__dealeroemenrollment.
      Enriched with OEM enrollment counts (active + total) and the most-recent contact
      row per dealer from int_repairlink__contact. This is the universe-level dealer
      view, NOT the trial subset — see dim_dealer_trial for lifecycle/trial context.
    columns:
      - name: dealer_id
        description: 11-char canonical dealer identifier. Stripped form aligned with dealer_mapper.dealer_id.
        tests: [not_null, unique]
      - name: total_oem_count
        description: Total count of distinct OEMs this dealer is enrolled with (active + inactive).
      - name: active_oem_count
        description: Count of distinct currently-active OEM enrollments.
      - name: contact_type_id
        description: Contact type associated with the enriched contact row (nullable when no matching contact).
      - name: org_name
        description: Organisation name from int_repairlink__contact enrichment. Nullable.
      - name: first_name
        description: Primary contact first name from int_contact enrichment.
      - name: last_name
        description: Primary contact last name from int_contact enrichment.
      - name: email
        description: Primary contact email from int_contact enrichment.
      - name: phone_business
        description: Business phone from int_contact enrichment.
      - name: phone_mobile
        description: Mobile phone from int_contact enrichment.
      - name: address_line_1
        description: Address line 1 from int_contact enrichment.
      - name: address_line_2
        description: Address line 2 from int_contact enrichment (normalized).
      - name: city
        description: City from int_contact enrichment (uppercased).
      - name: state
        description: State / province code from int_contact enrichment (uppercased).
      - name: postal_code
        description: Postal / ZIP code from int_contact enrichment.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code from int_contact enrichment.

  - name: int_repairlink__shop
    description: >
      One row per shop, deduplicated to the most recent config record.
      Clean shop entity ready for dimensional shaping in marts.
    columns:
      - name: shop_id
        description: Natural key for the shop.
        tests: [not_null, unique]
      - name: location_code
        description: Location code associated with the shop.
      - name: order_type
        description: >
          Order type configured for the shop.
          NOTE: only one distinct value (1) observed in current dev data.
          Variability expected once running on live production data.
      - name: created_at
        description: Record creation timestamp.
      - name: updated_at
        description: Record last updated timestamp.
      - name: contact_type_id
        description: Contact type identifier associated with the shop contact.
      - name: contact_type_name
        description: System contact type name/key.
      - name: contact_type_remark
        description: Human-readable contact type description.

  - name: int_repairlink__manufacturer
    description: >
      One row per manufacturer. Passthrough from stg_repairlink__manufacturer
      with the Unknown sentinel record (manufacturer_id = 0) excluded.
      Ready for dim_manufacturer.
    columns:
      - name: manufacturer_id
        description: Primary key for the manufacturer.
        tests: [not_null, unique]
      - name: manufacturer_name_long
        description: Full display name of the manufacturer.
        tests: [not_null]
      - name: manufacturer_name_short
        description: Short display name of the manufacturer.
      - name: abbreviation
        description: Abbreviated name of the manufacturer.
      - name: manufacturer_key
        description: Unique business key for the manufacturer.
        tests: [not_null, unique]
      - name: org_key
        description: Organisation key. Sparsely populated — only present for a few manufacturers.
      - name: industry_id
        description: Industry segment (1 = Automotive OEM, 4 = Construction, 5 = Commercial Trucks).
      - name: is_phoenix_published_inv
        description: Whether the manufacturer publishes inventory in Phoenix.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__country
    description: >
      One row per country. Passthrough from stg_repairlink__countrymaster
      with the Unknown sentinel record (country_id = 0) excluded.
      239 active countries. Ready for dim_country.
    columns:
      - name: country_id
        description: Primary key and ISO 3166-1 numeric country code.
        tests: [not_null, unique]
      - name: country_name
        description: Full formal country name.
        tests: [not_null]
      - name: two_letter_iso_code
        description: ISO 3166-1 alpha-2 code (e.g. US, GB).
        tests: [not_null]
      - name: three_letter_iso_code
        description: ISO 3166-1 alpha-3 code (e.g. USA, GBR).
        tests: [not_null]
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__currency
    description: >
      One row per currency. Passthrough from stg_repairlink__currencymaster
      with the Unknown sentinel record (currency_id = 0) excluded.
      164 active currencies. Ready for dim_currency.
    columns:
      - name: currency_id
        description: Primary key and ISO 4217 numeric currency code (e.g. 840 = USD, 978 = EUR).
        tests: [not_null, unique]
      - name: currency_name
        description: >
          Full name of the currency.
          NOTE: currency_name is NOT unique — two distinct currencies share the name 'Kwacha'
          (MWK = Malawian Kwacha, ZMK = Zambian Kwacha). This is a legitimate real-world overlap,
          not a data quality issue. For joining and display, always use currency_code (ISO 4217
          alpha-3) which IS unique, not currency_name.
        tests: [not_null]
      - name: currency_code
        description: ISO 4217 three-letter alphabetic code (e.g. USD, EUR).
        tests: [not_null]
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__vehicle
    description: >
      One row per physical vehicle, deduplicated by VIN to the most recent transaction record.
      Excludes records with null VIN (~8% of source) 
      Vehicle intermediate model enriched with Automotive Dimensions
      VIN intelligence data for vehicle make and model standardization
    columns:
      - name: vehicle_id
        description: Primary key from source (most recent transaction vehicle_id for this VIN).
        tests: [not_null, unique]
      - name: vin
        description: Vehicle Identification Number. Present on all rows (null VINs excluded upstream).
        tests: [not_null, unique]
      - name: transaction_id
        description: Foreign key to the most recent transaction this vehicle appeared in.
      - name: vehicle_type_id
        description: >
          Foreign key to the vehicle type enum (TRANSACTION_ENU_VEHICLETYPE).
          NOTE: only one distinct value (103) observed in current dev data.
          Variability expected once running on live production data.
      - name: vehicle_year
        description: Model year of the vehicle. Ranges from 1 to 2027 (future model years valid). year = 0 excluded.
      - name: vehicle_make
        description: Vehicle manufacturer/brand. Always populated. Original vehicle make value from RepairLink source system.
          Temporarily retained for validation and comparison against Automotive Dimensions standardized values.
        tests: [not_null]
      - name: vehicle_model
        description: Vehicle model name. Present in ~96% of records. Original vehicle model value from RepairLink source system.
          Temporarily retained for validation and comparison purposes.
      - name: vin_decoded_correctly
        description: >
          Whether the VIN was decoded.
          NOTE: always false in current dev data — VIN decoding is not yet implemented
          upstream. Variability expected once VIN decoding goes live.
      - name: created_at
        description: Record creation timestamp.
      - name: updated_at
        description: Record last updated timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.
      - name: vehicle_make_vintelligence
        description: >
          Standardized vehicle make value enriched from Automotive Dimensions VIN intelligence dataset.
      - name: vehicle_model_vintelligence
        description: >
          Standardized vehicle model value enriched from Automotive Dimensions VIN intelligence dataset.
      - name: vin_vintelligence
        description: >
          VIN pattern mask from Automotive Dimensions used for VIN matching validation.
      - name: vin_suffix_vehicle
        description: >
          Temporary validation field derived from RepairLink VIN.
          Used to validate VIN matching logic with Automotive Dimensions.

  - name: int_repairlink__contact
    description: >
      Reusable organizational / contact context, NOT a transactional model.
      Grain: one row per (org_key, contact_type_id). Per-row identifiers from source
      (contact_id, transaction_id, document_id) are intentionally dropped — this model
      exists to enrich entity dimensions (dim_dealer, dim_shop, etc.) with normalized
      org/contact attributes, not to represent individual transaction interactions.
      All text normalization (uppercase, initcap, address regex cleanup) is applied here.
    columns:
      - name: org_key
        description: Organization identifier (up to 30 chars in source). Composite PK with contact_type_id.
        tests: [not_null]
      - name: contact_type_id
        description: Contact type from the source enum (TRANSACTION_ENU_CONTACTTYPE). Composite PK with org_key.
      - name: org_name
        description: Organisation name, normalized to uppercase with leading spaces stripped.
      - name: name_title
        description: Title / salutation.
      - name: first_name
        description: Contact first name, normalized to initcap (first letter upper, rest lower).
      - name: middle_name
        description: Contact middle name.
      - name: last_name
        description: Contact last name, normalized to initcap.
      - name: last_name_2
        description: Secondary last name.
      - name: name_suffix
        description: Name suffix.
      - name: nickname
        description: Nickname.
      - name: email
        description: Email address.
      - name: phone_business
        description: Business phone number.
      - name: phone_mobile
        description: Mobile phone number.
      - name: phone_fax
        description: Fax number.
      - name: address_line_1
        description: Primary address line.
      - name: address_line_2
        description: Secondary address line, normalized — STE → SUITE, special chars removed, whitespace collapsed.
      - name: address_line_3
        description: Tertiary address line.
      - name: city
        description: City, normalized to uppercase with leading spaces stripped.
      - name: state
        description: State / province code, normalized to uppercase with leading spaces stripped.
      - name: postal_code
        description: Postal / ZIP code.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code (text lookup, not numeric FK).
      - name: latitude
        description: Geographic latitude.
      - name: longitude
        description: Geographic longitude.
      - name: locale_code
        description: Locale / language code.
      - name: website
        description: Website URL.
      - name: created_at
        description: Record creation timestamp from source.
      - name: updated_at
        description: Record last updated timestamp from source.
      - name: ingested_at
        description: Fivetran sync timestamp.
