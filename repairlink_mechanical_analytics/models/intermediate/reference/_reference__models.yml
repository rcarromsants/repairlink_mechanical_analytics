version: 2

models:

  - name: ref_repairlink__country
    description: >
      One row per country. Passthrough from stg_repairlink__countrymaster
      with the Unknown sentinel record (country_id = 0) excluded.
      239 active countries. Ready for downstream reference usage.

    columns:
      - name: country_id
        description: ISO numeric country identifier.
        tests:
          - unique
          - not_null
      - name: country_name
        description: Country name.
      - name: two_letter_iso_code
        description: ISO alpha-2 country code.
      - name: three_letter_iso_code
        description: ISO alpha-3 country code.


  - name: ref_repairlink__currency
    description: >
      Reference table containing RepairLink currency lookup data
      used by intermediate and downstream models.
      One row per currency. Passthrough from stg_repairlink__currencymaster
      with the Unknown sentinel record (currency_id = 0) excluded.
      164 active currencies.

    columns:
      - name: currency_id
        description: Primary key and ISO 4217 numeric currency code (e.g. 840 = USD, 978 = EUR).
        tests: [not_null, unique]
      - name: currency_name
        description: Full name of the currency.
          NOTE currency_name is NOT unique — two distinct currencies share the name 'Kwacha'
          (MWK = Malawian Kwacha, ZMK = Zambian Kwacha). This is a legitimate real-world overlap,
          not a data quality issue. For joining and display, always use currency_code (ISO 4217
          alpha-3) which IS unique, not currency_name.
        tests: [not_null]
      - name: currency_code
        description: ISO 4217 three-letter alphabetic code (e.g. USD, EUR).
        tests: [not_null]
      - name: ingested_at
        description: Fivetran sync timestamp.


  - name: ref_repairlink__oem
    description: >
      OEM reference lookup table sourced from dealer OEM enrollment data.

    columns:
      - name: oem_id
        description: OEM identifier from RepairLink.
        tests:
          - not_null
          - unique

      - name: oem_name
        description: OEM display name.

  - name: ref_repairlink__contact_type
    description: >
      Reference lookup table for RepairLink contact types.

    columns:
      - name: contact_type_id
        description: Contact type identifier.
        tests:
          - not_null

      - name: contact_type_name
        description: System contact type name/key.

      - name: contact_type_remark
        description: Human-readable contact type description.