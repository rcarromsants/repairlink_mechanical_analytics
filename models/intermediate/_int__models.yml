version: 2

models:

  - name: int_repairlink__dealer
    description: >
      Canonical dealer entity model combining operational dealer datasets with dealer-related organizational contact activity.
      Organizational contacts are also treated as evidence of dealer existence,
      expanding dealer coverage beyond traditional operational sources.
      This logic should be revisited with the business in the future to confirm whether contact-derived entities should permanently contribute to the canonical dealer universe.
    columns:
      - name: dealer_id
        description: >
          Canonical 11-character dealer identifier.
        tests:
          - not_null
          - unique
      - name: is_contact_source
        description: >
          Indicates whether the dealer entity was identified through dealer-related organizational contacts (contact_type_id 101 or 104).
      - name: is_dealer_source
        description: >
          Indicates whether the dealer entity was identified through the operational dealer datasets (dealertrial, dealer_mapper, or dealeroemenrollment).
      - name: total_oem_count
        description: >
          Total number of OEM enrollments associated with the dealer.
      - name: active_oem_count
        description: >
          Number of currently active OEM enrollments associated with the dealer.
      - name: contact_type_id
        description: >
          Contact type identifier associated with the selected
          dealer organizational enrichment record.
      - name: org_name
        description: Dealer organization name.
      - name: first_name
        description: Primary contact first name.
      - name: last_name
        description: Primary contact last name.
      - name: email
        description: Primary contact email.
      - name: phone_business
        description: Business phone number.
      - name: phone_mobile
        description: Mobile phone number.
      - name: address_line_1
        description: Primary address line.
      - name: address_line_2
        description: Secondary address line.
      - name: city
        description: City name.
      - name: state
        description: State or province code.
      - name: postal_code
        description: Postal or ZIP code.
      - name: country_code
        description: ISO alpha-2 country code.
      - name: contact_created_at
        description: Timestamp from the contact record selected for dealer enrichment.
      - name: contact_updated_at
        description: Last update timestamp from the contact record selected for dealer enrichment.
      - name: contact_ingested_at
        description: Ingestion timestamp from the contact record selected for dealer enrichment.

  - name: int_repairlink__shop
    description: >
      Canonical shop entity model combining operational shop configuration
      data with shop-related organizational contact activity.
      Organizational contacts are also treated as evidence of shop existence,
      expanding shop coverage beyond operational configuration datasets.
      This logic should be revisited with the business in the future to confirm whether contact-derived entities should permanently contribute to the canonical shop universe.
    columns:
      - name: shop_id
        description: >
          Canonical 11-character shop identifier.
        tests:
          - not_null
          - unique
      - name: location_code
        description: Shop location code from SHOPCONFIG.
      - name: order_type
        description: Shop order type configuration.
      - name: is_contact_source
        description: >
          Indicates whether the shop entity was identified through shop-related organizational contacts (contact_type_id 100 or 103).
      - name: is_shop_source
        description: >
          Indicates whether the shop entity was identified through the operational shop configuration dataset.
      - name: contact_type_id
        description: >
          Contact type identifier associated with the selected
          shop organizational enrichment record.
      - name: contact_type_name
        description: >
          Contact type semantic name from the contact type reference dataset.
      - name: contact_type_remark
        description: >
          Additional contact type semantic description.
      - name: org_name
        description: Shop organization name.
      - name: first_name
        description: Primary contact first name.
      - name: last_name
        description: Primary contact last name.
      - name: email
        description: Primary contact email.
      - name: phone_business
        description: Business phone number.
      - name: phone_mobile
        description: Mobile phone number.
      - name: phone_fax
        description: Fax number.
      - name: address_line_1
        description: Primary address line.
      - name: address_line_2
        description: Secondary address line.
      - name: address_line_3
        description: Tertiary address line.
      - name: city
        description: City name.
      - name: state
        description: State or province code.
      - name: postal_code
        description: Postal or ZIP code.
      - name: country_code
        description: ISO alpha-2 country code.
      - name: latitude
        description: Geographic latitude coordinate.
      - name: longitude
        description: Geographic longitude coordinate.
      - name: locale_code
        description: Locale/language code.
      - name: website
        description: Shop website URL.
      - name: contact_created_at
        description: Timestamp from the contact record selected for shop enrichment.
      - name: contact_updated_at
        description: Last update timestamp from the contact record selected for shop enrichment.
      - name: contact_ingested_at
        description: Ingestion timestamp from the contact record selected for shop enrichment.

  - name: int_repairlink__manufacturer
    description: >
      One row per manufacturer. Passthrough from stg_repairlink__manufacturer
      with the Unknown sentinel record (manufacturer_id = 0) excluded.
      Ready for dim_manufacturer.
    columns:
      - name: manufacturer_id
        description: Primary key for the manufacturer.
        tests: [not_null, unique]
      - name: manufacturer_name_long
        description: Full display name of the manufacturer.
        tests: [not_null]
      - name: manufacturer_name_short
        description: Short display name of the manufacturer.
      - name: abbreviation
        description: Abbreviated name of the manufacturer.
      - name: manufacturer_key
        description: Unique business key for the manufacturer.
        tests: [not_null, unique]
      - name: org_key
        description: Organisation key. Sparsely populated — only present for a few manufacturers.
      - name: industry_id
        description: Industry segment (1 = Automotive OEM, 4 = Construction, 5 = Commercial Trucks).
      - name: is_phoenix_published_inv
        description: Whether the manufacturer publishes inventory in Phoenix.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__vehicle
    description: >
      One row per physical vehicle, deduplicated by VIN to the most recent
      transaction record.
      Excludes records with null VIN (~8% of source).
      Vehicle entity enriched with Automotive Dimensions VIN intelligence data.
      Canonical vehicle make/model values preferentially come from VIN intelligence;
      when no VIN intelligence match exists, normalized RepairLink source values
      are used as fallback.

    columns:
      - name: vehicle_id
        description: >
          Primary key from source (most recent transaction vehicle_id for this VIN).
        tests: [not_null, unique]
      - name: vin
        description: >
          Vehicle Identification Number. Null VINs excluded upstream.
        tests: [not_null, unique]
      - name: transaction_id
        description: >
          Foreign key to the most recent transaction this vehicle appeared in.
      - name: vehicle_type_id
        description: >
          Foreign key to the vehicle type enum (TRANSACTION_ENU_VEHICLETYPE).
      - name: status_id
        description: Vehicle status identifier.
      - name: vehicle_year
        description: >
          Vehicle model year. Future model years are valid.
      - name: vehicle_make
        description: >
          Canonical vehicle make value.
          Preferentially sourced from Automotive Dimensions VIN intelligence.
          Falls back to normalized RepairLink source values when VIN enrichment
          is unavailable.
        tests: [not_null]
      - name: vehicle_model
        description: >
          Canonical vehicle model value.
          Preferentially sourced from Automotive Dimensions VIN intelligence.
          Falls back to normalized RepairLink source values when VIN enrichment
          is unavailable.
      - name: vin_vintelligence
        description: >
          VIN pattern mask from Automotive Dimensions used for VIN matching validation.
      - name: vin_decoded_correctly
        description: >
          Indicates whether the VIN successfully matched the Automotive Dimensions
          VIN intelligence dataset.
      - name: created_at
        description: Record creation timestamp.
      - name: updated_at
        description: Record last updated timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__contact
    description: >
      Reusable organizational / contact context, NOT a transactional model.
      Grain: one row per (org_key, contact_type_id). Per-row identifiers from source
      (contact_id, transaction_id, document_id) are intentionally dropped — this model
      exists to enrich entity dimensions (dim_dealer, dim_shop, etc.) with normalized
      org/contact attributes, not to represent individual transaction interactions.
      All text normalization (uppercase, initcap, address regex cleanup) is applied here.
    columns:
      - name: org_key
        description: Organization identifier (up to 30 chars in source). Composite PK with contact_type_id.
        tests: [not_null]
      - name: contact_type_id
        description: Contact type from the source enum (TRANSACTION_ENU_CONTACTTYPE). Composite PK with org_key.
      - name: org_name
        description: Organisation name, normalized to uppercase with leading spaces stripped.
      - name: name_title
        description: Title / salutation.
      - name: first_name
        description: Contact first name, normalized to initcap (first letter upper, rest lower).
      - name: middle_name
        description: Contact middle name.
      - name: last_name
        description: Contact last name, normalized to initcap.
      - name: last_name_2
        description: Secondary last name.
      - name: name_suffix
        description: Name suffix.
      - name: nickname
        description: Nickname.
      - name: email
        description: Email address.
      - name: phone_business
        description: Business phone number.
      - name: phone_mobile
        description: Mobile phone number.
      - name: phone_fax
        description: Fax number.
      - name: address_line_1
        description: Primary address line.
      - name: address_line_2
        description: Secondary address line, normalized — STE → SUITE, special chars removed, whitespace collapsed.
      - name: address_line_3
        description: Tertiary address line.
      - name: city
        description: City, normalized to uppercase with leading spaces stripped.
      - name: state
        description: State / province code, normalized to uppercase with leading spaces stripped.
      - name: postal_code
        description: Postal / ZIP code.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code (text lookup, not numeric FK).
      - name: latitude
        description: Geographic latitude.
      - name: longitude
        description: Geographic longitude.
      - name: locale_code
        description: Locale / language code.
      - name: website
        description: Website URL.
      - name: created_at
        description: Record creation timestamp from source.
      - name: updated_at
        description: Record last updated timestamp from source.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__transaction
    description: >
      One row per RepairLink transaction (source TRANSACTION_TRX_TRANSACTION).
      Text normalization applied: org keys, transaction_no, repair_order_number, and external_id
      normalized to UPPER(TRIM()). Free-text external fields trimmed only.
      Columns with 100% null values dropped: transaction_parent_id, workflow_id,
      amt_parts/labor/materials/sublet/deductible, amt_trx_shipping/adjustment,
      supplement_level, transaction_event_log_id, repair_order_type, claim_number,
      insurance fields, external_xml, external_ird, and all scheduling/lifecycle
      timestamps except trx_opened_at.
    columns:
      - name: transaction_id
        description: Primary key. Source TRANSACTIONID.
        tests: [not_null, unique]
      - name: transaction_no
        description: Human-readable transaction number. Normalized to UPPER(TRIM()).
      - name: transaction_type_id
        description: Transaction type code.
        tests: [not_null]
      - name: transaction_subtype_id
        description: Transaction sub-type code.
      - name: transaction_state_id
        description: Current lifecycle state of the transaction.
      - name: transaction_substate_id
        description: Sub-state within the lifecycle state.
      - name: transmission_type_id
        description: Transmission type (e.g. EDI, web).
      - name: status_id
        description: Numeric status code.
      - name: org_key_buyer
        description: Org key of the buying party. Normalized to UPPER(TRIM()). Join to dim_dealer or dim_shop.
      - name: org_key_seller
        description: Org key of the selling party. Normalized to UPPER(TRIM()). Join to dim_dealer.
      - name: org_key_initiator
        description: Org key of the party that initiated the transaction. Normalized to UPPER(TRIM()).
      - name: org_key_responder
        description: Org key of the responding party. Normalized to UPPER(TRIM()).
      - name: org_key_integrator
        description: Org key of the integrating party. Normalized to UPPER(TRIM()).
      - name: amt_trx_subtotal
        description: Transaction subtotal before tax.
      - name: amt_trx_tax
        description: Tax amount on the transaction.
      - name: amt_trx_total
        description: Total transaction amount.
      - name: currency_id
        description: Currency identifier.
      - name: trx_opened_at
        description: Timestamp when the transaction was opened.
        tests: [not_null]
      - name: repair_order_number
        description: External repair order number from the shop DMS. Normalized to UPPER(TRIM()).
      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).
      - name: external_field_1
        description: External integration field 1. Trimmed.
      - name: external_field_2
        description: External integration field 2. Trimmed.
      - name: external_field_3
        description: External integration field 3. Trimmed.
      - name: external_field_4
        description: External integration field 4. Trimmed.
      - name: external_field_5
        description: External integration field 5. Trimmed.
      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]
      - name: updated_at
        description: Record last update timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__document
    description: >
      One row per RepairLink document (source TRANSACTION_TRX_DOCUMENT).
      Text normalization applied: document_no, org keys, external_id normalized to
      UPPER(TRIM()). External XML and fields trimmed only.
      Columns with 100% null values dropped: document_parent_id, sourcing_type,
      payment_method_id, all shipping columns, amt_doc_shipping/handling,
      document_event_log_id, external_ird, external_field_4/5, and all lifecycle
      dates except doc_opened_at.
    columns:
      - name: document_id
        description: Primary key. Source DOCUMENTID.
        tests: [not_null, unique]
      - name: document_no
        description: Human-readable document number. Normalized to UPPER(TRIM()).
      - name: transaction_id
        description: Foreign key to int_repairlink__transaction.
        tests:
          - not_null
          - relationships:
              to: ref('int_repairlink__transaction')
              field: transaction_id
      - name: document_type_id
        description: Document type code.
        tests: [not_null]
      - name: document_subtype_id
        description: Document sub-type code.
      - name: document_state_id
        description: Current lifecycle state of the document.
      - name: document_substate_id
        description: Sub-state within the lifecycle state.
      - name: status_id
        description: Numeric status code.
      - name: org_key_doc_source
        description: Org key of the document source party. Normalized to UPPER(TRIM()).
      - name: org_key_doc_target
        description: Org key of the document target party. Normalized to UPPER(TRIM()).
      - name: manufacturer_id
        description: Manufacturer associated with the document. Join to dim_manufacturer.
      - name: amt_doc_subtotal
        description: Document subtotal before tax.
      - name: amt_doc_tax
        description: Tax amount on the document.
      - name: amt_doc_core_total
        description: Core charge total on the document.
      - name: amt_doc_total
        description: Total document amount.
      - name: doc_opened_at
        description: Timestamp when the document was opened.
      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).
      - name: external_xml
        description: External XML payload. Trimmed.
      - name: external_field_1
        description: External integration field 1. Trimmed.
      - name: external_field_2
        description: External integration field 2. Trimmed.
      - name: external_field_3
        description: External integration field 3. Trimmed.
      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]
      - name: updated_at
        description: Record last update timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__lineitem
    description: >
      One row per RepairLink line item (source TRANSACTION_TRX_LINEITEM).
      Text normalization applied: line_item_no, item_name, item_description,
      part_pool_data_source, and external_id normalized to UPPER(TRIM()).
      External XML trimmed only.
      Columns with 100% null values dropped: qty_available, qty_on_order,
      amt_unit_base/adjust, all extended price columns except amt_ext_net/final,
      amt_tax, amt_shipping, all package columns, amt_baf_source,
      line_item_event_log_id, external_ird, external_field_1-5.
    columns:
      - name: line_item_id
        description: Primary key. Source LINEITEMID.
        tests: [not_null, unique]
      - name: line_item_no
        description: Human-readable line item number. Normalized to UPPER(TRIM()).
      - name: line_item_parent_id
        description: Parent line item identifier for hierarchical structures.
      - name: document_id
        description: Foreign key to int_repairlink__document.
        tests:
          - not_null
          - relationships:
              to: ref('int_repairlink__document')
              field: document_id
      - name: part_pool_id
        description: Foreign key to int_repairlink__partpool.
        tests: [not_null]
      - name: line_item_type_id
        description: Line item type code.
      - name: line_item_sort
        description: Sort order for display within the document.
      - name: line_item_state_id
        description: Current lifecycle state of the line item.
      - name: line_item_substate_id
        description: Sub-state within the lifecycle state.
      - name: status_id
        description: Numeric status code.
      - name: item_name
        description: Part name / short description. Normalized to UPPER(TRIM()).
      - name: item_description
        description: Full part description. Normalized to UPPER(TRIM()).
      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.
      - name: unit_of_measure_id
        description: Unit of measure for quantity.
      - name: qty
        description: Ordered quantity.
      - name: qty_on_hand
        description: Quantity on hand at the supplier at order time.
      - name: qty_each_per_unit
        description: Number of individual pieces per unit.
      - name: amt_unit_cost
        description: Supplier cost per unit.
      - name: amt_unit_list
        description: List (MSRP) price per unit.
      - name: amt_unit_wholesale
        description: Wholesale price per unit.
      - name: amt_unit_trade
        description: Trade price per unit.
      - name: amt_unit_core
        description: Core charge per unit.
      - name: amt_unit_net
        description: Net price per unit after adjustments.
      - name: amt_unit_final
        description: Final agreed price per unit.
      - name: amt_ext_net
        description: Extended net price (amt_unit_net × qty).
      - name: amt_ext_final
        description: Extended final price (amt_unit_final × qty).
      - name: part_pool_data_source
        description: Data source code for the part pool entry. Normalized to UPPER(TRIM()).
      - name: part_avail_at
        description: Timestamp when the part will be available.
      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).
      - name: external_xml
        description: External XML payload. Trimmed.
      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]
      - name: updated_at
        description: Record last update timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__partpool
    description: >
      One row per RepairLink part pool entry (source TRANSACTION_TRX_PARTPOOL).
      Text normalization applied: part_no, part_description, part_no_apm,
      part_description_apm/epc, and locale_code normalized to UPPER(TRIM()).
      External XML trimmed only.
      Columns with 100% null values dropped: part_pool_parent_id, all part_usage
      columns, base and DLR/DMS/EPC pricing tiers, scrub validation fields,
      part_no_dlr/dms/epc, part_description_dlr/dms, external_id/ird/field_1-5,
      and scrub_validated_at. Only APM pricing and EPC description survive.
    columns:
      - name: part_pool_id
        description: Primary key. Source PARTPOOLID.
        tests: [not_null, unique]
      - name: transaction_id
        description: Foreign key to int_repairlink__transaction.
        tests:
          - not_null
          - relationships:
              to: ref('int_repairlink__transaction')
              field: transaction_id
      - name: part_pool_type_id
        description: Part pool type code.
      - name: part_no
        description: Canonical part number. Normalized to UPPER(TRIM()).
      - name: part_description
        description: Canonical part description. Normalized to UPPER(TRIM()).
      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.
      - name: part_type_external_id
        description: External part type classification identifier.
      - name: part_type_internal_id
        description: Internal part type classification identifier.
      - name: status_id
        description: Numeric status code.
      - name: locale_code
        description: Locale code for the part pool entry. Normalized to UPPER(TRIM()).
      - name: part_no_apm
        description: Aftermarket (APM) part number. Normalized to UPPER(TRIM()).
      - name: part_description_apm
        description: APM part description. Normalized to UPPER(TRIM()).
      - name: part_description_epc
        description: EPC-sourced part description. Normalized to UPPER(TRIM()).
      - name: amt_unit_cost_apm
        description: APM cost per unit.
      - name: amt_unit_list_apm
        description: APM list price per unit.
      - name: amt_unit_wholesale_apm
        description: APM wholesale price per unit.
      - name: amt_unit_trade_apm
        description: APM trade price per unit.
      - name: amt_unit_core_apm
        description: APM core charge per unit.
      - name: external_xml
        description: External XML payload. Trimmed.
      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]
      - name: updated_at
        description: Record last update timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.

  - name: int_repairlink__pma_lineitem
    description: >
      One row per (line_item_id, program_id) PMA cross-reference record
      (source PMAPROGRAM_XRF_LINEITEM). Text normalization applied: program_match_message
      and program_display_text trimmed (free text, case preserved).
      Only part_num_oe_xref dropped (100% null). See DAT-2586 for coverage notes —
      ~73% of PMA records have no matching int_repairlink__lineitem row; always LEFT join.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - line_item_id
            - program_id
    columns:
      - name: line_item_id
        description: Part of composite PK. Optional FK to int_repairlink__lineitem (LEFT join only).
        tests: [not_null]
      - name: program_id
        description: Part of composite PK. PMA reimbursement program identifier.
        tests: [not_null]
      - name: transaction_id
        description: Foreign key to int_repairlink__transaction.
      - name: comparison_result_id
        description: Comparison result that produced the program match. Sparsely populated.
      - name: qualification_type_id
        description: Qualification type applied when matching the line item to the program.
      - name: qualification_status_id
        description: Qualification outcome status. Sparsely populated.
      - name: status_id
        description: Numeric status code. Observed as 1 across all current data.
      - name: program_value
        description: >
          Program reimbursement value. May be a percentage (e.g. 0.15 = 15%) or a flat
          amount (e.g. 55.97). Interpret per program_id.
      - name: program_match_message
        description: Free-text message describing the match condition. Trimmed.
      - name: program_display_text
        description: Customer-facing text describing the reimbursement program. Trimmed.
      - name: is_show_columns
        description: UI flag controlling whether program columns are shown.
      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]
      - name: updated_at
        description: Record last update timestamp.
      - name: ingested_at
        description: Fivetran sync timestamp.
