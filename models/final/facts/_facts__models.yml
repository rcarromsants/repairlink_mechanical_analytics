version: 2

models:

  - name: fct_transaction
    description: >
      Transaction fact table at the transaction grain. One row per RepairLink transaction
      (source TRANSACTION_TRX_TRANSACTION), sourced from int_repairlink__transaction.
      Text normalization (UPPER/TRIM) applied at the intermediate layer on all org keys,
      transaction_no, repair_order_number, and external_id.
      Columns with 100% null values excluded: transaction_parent_id, workflow_id,
      amt_parts/labor/materials/sublet/deductible, amt_trx_shipping/adjustment,
      supplement_level, transaction_event_log_id, repair_order_type, claim_number,
      all insurance fields, external_xml, external_ird, and all scheduling/lifecycle
      timestamps except trx_opened_at.

    columns:
      - name: transaction_id
        description: Primary key. Source TRANSACTIONID.
        tests: [not_null, unique]

      - name: transaction_no
        description: Human-readable transaction number. Normalized to UPPER(TRIM()).

      - name: transaction_type_id
        description: Transaction type code.
        tests: [not_null]

      - name: transaction_subtype_id
        description: Transaction sub-type code.

      - name: transaction_state_id
        description: Current lifecycle state of the transaction.

      - name: transaction_substate_id
        description: Sub-state within the lifecycle state.

      - name: transmission_type_id
        description: Transmission type (e.g. EDI, web).

      - name: status_id
        description: Numeric status code.

      - name: org_key_buyer
        description: Org key of the buying party. Normalized to UPPER(TRIM()). Join to dim_dealer or dim_shop.

      - name: org_key_seller
        description: Org key of the selling party. Normalized to UPPER(TRIM()). Join to dim_dealer.

      - name: org_key_initiator
        description: Org key of the party that initiated the transaction. Normalized to UPPER(TRIM()).

      - name: org_key_responder
        description: Org key of the responding party. Normalized to UPPER(TRIM()).

      - name: org_key_integrator
        description: Org key of the integrating party (e.g. DMS/EPC system). Normalized to UPPER(TRIM()).

      - name: amt_trx_subtotal
        description: Transaction subtotal before tax.

      - name: amt_trx_tax
        description: Tax amount on the transaction.

      - name: amt_trx_total
        description: Total transaction amount.

      - name: currency_id
        description: Currency identifier. Join to ref_repairlink__currency.

      - name: trx_opened_at
        description: Timestamp when the transaction was opened.
        tests: [not_null]

      - name: repair_order_number
        description: External repair order number from the shop's DMS. Normalized to UPPER(TRIM()).

      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).

      - name: external_field_1
        description: External integration field 1. Trimmed.

      - name: external_field_2
        description: External integration field 2. Trimmed.

      - name: external_field_3
        description: External integration field 3. Trimmed.

      - name: external_field_4
        description: External integration field 4. Trimmed.

      - name: external_field_5
        description: External integration field 5. Trimmed.

      - name: created_by
        description: User (GUID) who created the record.

      - name: updated_by
        description: User (GUID) who last updated the record.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_document
    description: >
      Document fact table at the document grain. One row per RepairLink document
      (source TRANSACTION_TRX_DOCUMENT), sourced from int_repairlink__document.
      A transaction can have multiple documents. Text normalization (UPPER/TRIM) applied
      at the intermediate layer on document_no, org keys, and external_id.
      Columns with 100% null values excluded: document_parent_id, sourcing_type,
      payment_method_id, all shipping columns (carrier/service/bill/dropoff type IDs,
      weight, est_value, tracking_no, bill_act_*), amt_doc_shipping/handling,
      document_event_log_id, external_ird, external_field_4/5, and all lifecycle
      dates except doc_opened_at.

    columns:
      - name: document_id
        description: Primary key. Source DOCUMENTID.
        tests: [not_null, unique]

      - name: document_no
        description: Human-readable document number. Normalized to UPPER(TRIM()).

      - name: transaction_id
        description: Foreign key to fct_transaction.
        tests:
          - not_null
          - relationships:
              to: ref('fct_transaction')
              field: transaction_id

      - name: document_type_id
        description: Document type code (e.g. purchase order, invoice, return).
        tests: [not_null]

      - name: document_subtype_id
        description: Document sub-type code.

      - name: document_state_id
        description: Current lifecycle state of the document.

      - name: document_substate_id
        description: Sub-state within the lifecycle state.

      - name: status_id
        description: Numeric status code.

      - name: org_key_doc_source
        description: Org key of the document source party. Normalized to UPPER(TRIM()). Join to dim_dealer or dim_shop.

      - name: org_key_doc_target
        description: Org key of the document target party. Normalized to UPPER(TRIM()). Join to dim_dealer or dim_shop.

      - name: manufacturer_id
        description: Manufacturer associated with the document. Join to dim_manufacturer.

      - name: amt_doc_subtotal
        description: Document subtotal before tax and adjustment.

      - name: amt_doc_tax
        description: Tax amount on the document.

      - name: amt_doc_adjustment
        description: Adjustment amount on the document.

      - name: amt_doc_core_total
        description: Core charge total on the document.

      - name: amt_doc_total
        description: Total document amount.

      - name: doc_opened_at
        description: Timestamp when the document was opened.

      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).

      - name: external_xml
        description: External XML payload. Trimmed.

      - name: external_field_1
        description: External integration field 1. Trimmed.

      - name: external_field_2
        description: External integration field 2. Trimmed.

      - name: external_field_3
        description: External integration field 3. Trimmed.

      - name: created_by
        description: User (GUID) who created the record.

      - name: updated_by
        description: User (GUID) who last updated the record.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_lineitem
    description: >
      Line item fact table at the line item grain. One row per line item
      (source TRANSACTION_TRX_LINEITEM), sourced from int_repairlink__lineitem.
      The most granular transaction entity — captures part identity, quantity,
      and unit/extended pricing for the net and final price types. Text normalization
      (UPPER/TRIM) applied at the intermediate layer on line_item_no, item_name,
      item_description, part_pool_data_source, and external_id.
      Columns with 100% null values excluded: qty_available, qty_on_order,
      amt_unit_base/adjust, all extended prices except amt_ext_net/final,
      amt_tax, amt_shipping, all package columns, amt_baf_source,
      line_item_event_log_id, external_ird, external_field_1-5.

    columns:
      - name: line_item_id
        description: Primary key. Source LINEITEMID.
        tests: [not_null, unique]

      - name: line_item_no
        description: Human-readable line item number. Normalized to UPPER(TRIM()).

      - name: line_item_parent_id
        description: Parent line item identifier for hierarchical line item structures.

      - name: document_id
        description: Foreign key to fct_document.
        tests:
          - not_null
          - relationships:
              to: ref('fct_document')
              field: document_id

      - name: part_pool_id
        description: Foreign key to fct_partpool. Identifies the part being ordered.
        tests: [not_null]

      - name: line_item_type_id
        description: Line item type code.

      - name: line_item_sort
        description: Sort order for display within the document.

      - name: line_item_state_id
        description: Current lifecycle state of the line item.

      - name: line_item_substate_id
        description: Sub-state within the lifecycle state.

      - name: status_id
        description: Numeric status code.

      - name: item_name
        description: Part name / short description. Normalized to UPPER(TRIM()).

      - name: item_description
        description: Full part description. Normalized to UPPER(TRIM()).

      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.

      - name: unit_of_measure_id
        description: Unit of measure for quantity.

      - name: qty
        description: Ordered quantity.

      - name: qty_on_hand
        description: Quantity on hand at the supplier at order time.

      - name: qty_each_per_unit
        description: Number of individual pieces per unit.

      - name: amt_unit_cost
        description: Supplier cost per unit.

      - name: amt_unit_list
        description: List (MSRP) price per unit.

      - name: amt_unit_wholesale
        description: Wholesale price per unit.

      - name: amt_unit_trade
        description: Trade price per unit.

      - name: amt_unit_core
        description: Core charge per unit.

      - name: amt_unit_net
        description: Net price per unit after adjustments.

      - name: amt_unit_final
        description: Final agreed price per unit.

      - name: amt_ext_net
        description: Extended net price (amt_unit_net × qty).

      - name: amt_ext_final
        description: Extended final price (amt_unit_final × qty).

      - name: part_pool_data_source
        description: Data source code that provided the part pool entry. Normalized to UPPER(TRIM()).

      - name: part_avail_at
        description: Timestamp when the part will be available.

      - name: external_id
        description: External system identifier. Normalized to UPPER(TRIM()).

      - name: external_xml
        description: External XML payload. Trimmed.

      - name: created_by
        description: User (GUID) who created the record.

      - name: updated_by
        description: User (GUID) who last updated the record.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_partpool
    description: >
      Part pool fact table at the part pool grain. One row per part pool entry
      (source TRANSACTION_TRX_PARTPOOL), sourced from int_repairlink__partpool.
      A part pool represents the available part options presented to the buyer for a
      given repair need within a transaction. Text normalization (UPPER/TRIM) applied
      at the intermediate layer on part_no, part_description, part_no_apm,
      part_description_apm/epc, and locale_code.
      Columns with 100% null values excluded: part_pool_parent_id, all part_usage
      columns, all base and DLR/DMS/EPC pricing tiers, scrub validation fields,
      part_no_dlr/dms/epc, part_description_dlr/dms, external_id/ird/field_1-5,
      and scrub_validated_at. Only APM pricing and EPC description survive.

    columns:
      - name: part_pool_id
        description: Primary key. Source PARTPOOLID.
        tests: [not_null, unique]

      - name: transaction_id
        description: Foreign key to fct_transaction.
        tests:
          - not_null
          - relationships:
              to: ref('fct_transaction')
              field: transaction_id

      - name: part_pool_type_id
        description: Part pool type code.

      - name: part_no
        description: Canonical part number. Normalized to UPPER(TRIM()).

      - name: part_description
        description: Canonical part description. Normalized to UPPER(TRIM()).

      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.

      - name: part_type_external_id
        description: External part type classification identifier.

      - name: part_type_internal_id
        description: Internal part type classification identifier.

      - name: status_id
        description: Numeric status code.

      - name: locale_code
        description: Locale code for the part pool entry. Normalized to UPPER(TRIM()).

      - name: part_no_apm
        description: Aftermarket (APM) part number. Normalized to UPPER(TRIM()). DLR/DMS/EPC 100% null in source.

      - name: part_description_apm
        description: APM part description. Normalized to UPPER(TRIM()). DLR/DMS 100% null in source.

      - name: part_description_epc
        description: EPC-sourced part description. Normalized to UPPER(TRIM()). DLR/DMS 100% null in source.

      - name: amt_unit_cost_apm
        description: APM cost per unit. All other pricing tiers (base, DLR, DMS, EPC) 100% null in source.

      - name: amt_unit_list_apm
        description: APM list price per unit.

      - name: amt_unit_wholesale_apm
        description: APM wholesale price per unit.

      - name: amt_unit_trade_apm
        description: APM trade price per unit.

      - name: amt_unit_core_apm
        description: APM core charge per unit.

      - name: external_xml
        description: External XML payload. Trimmed.

      - name: created_by
        description: User (GUID) who created the record.

      - name: updated_by
        description: User (GUID) who last updated the record.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_pma_lineitem
    description: >
      PMA (Parts Manufacturer Allowance) line item fact table. One row per
      (line_item_id, program_id) — a line item can qualify for multiple programs,
      so the composite key is the grain (source PMAPROGRAM_XRF_LINEITEM), sourced from
      int_repairlink__pma_lineitem. Text normalization applied at the intermediate layer:
      program_match_message and program_display_text trimmed (free text, case preserved).
      Only part_num_oe_xref dropped (100% null). Modeled as a standalone fact, NOT an
      enrichment of fct_lineitem — join coverage is partial in both directions
      (see DAT-2586): only ~10.5% of fct_lineitem rows have a PMA record, and ~73%
      of PMA records have no matching fct_lineitem row. Always use LEFT joins.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - line_item_id
            - program_id

    columns:
      - name: line_item_id
        description: >
          Part of composite PK. OPTIONAL foreign key to fct_lineitem — only ~10.5%
          of fct_lineitem rows have a PMA record; always LEFT join.
        tests: [not_null]

      - name: program_id
        description: Part of composite PK. Identifier of the PMA reimbursement program.
        tests: [not_null]

      - name: transaction_id
        description: Foreign key to fct_transaction.

      - name: comparison_result_id
        description: Identifier of the comparison result that produced the program match. Sparsely populated.

      - name: qualification_type_id
        description: Type of qualification applied when matching the line item to the program.

      - name: qualification_status_id
        description: Status of the qualification outcome. Sparsely populated.

      - name: status_id
        description: Numeric status code. Observed as 1 across all current data.

      - name: program_value
        description: >
          Program reimbursement value. May be a percentage (e.g. 0.15 = 15%) or a flat
          amount (e.g. 55.97). Interpret per program_id.

      - name: program_match_message
        description: Free-text message describing the match condition. Trimmed.

      - name: program_display_text
        description: Customer-facing text describing the reimbursement program and how to claim it. Trimmed.

      - name: is_show_columns
        description: UI flag controlling whether program columns are shown. False across observed data.

      - name: created_by
        description: User (GUID) who created the record.

      - name: updated_by
        description: User (GUID) who last updated the record.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.
