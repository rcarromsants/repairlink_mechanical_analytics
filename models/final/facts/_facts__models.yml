version: 2

models:

  - name: fct_transaction
    description: >
      Transaction fact table at the transaction grain. One row per RepairLink transaction
      (source TRANSACTION_TRX_TRANSACTION). Captures lifecycle dates, financial totals,
      party org keys, and repair/insurance context. The org key columns (org_key_buyer,
      org_key_seller, etc.) are the join path to dim_dealer and dim_shop.

    columns:
      - name: transaction_id
        description: Primary key. Source TRANSACTIONID.
        tests: [not_null, unique]

      - name: transaction_no
        description: Human-readable transaction number.

      - name: transaction_parent_id
        description: Parent transaction identifier for child/supplement transactions.

      - name: workflow_id
        description: Workflow identifier governing this transaction.

      - name: transaction_type_id
        description: Transaction type code.
        tests: [not_null]

      - name: transaction_subtype_id
        description: Transaction sub-type code.

      - name: transaction_state_id
        description: Current lifecycle state of the transaction.

      - name: transaction_substate_id
        description: Sub-state within the lifecycle state.

      - name: transmission_type_id
        description: Transmission type (e.g. EDI, web).

      - name: status_id
        description: Numeric status code.

      - name: org_key_buyer
        description: Org key of the buying party. Join to dim_dealer or dim_shop.

      - name: org_key_seller
        description: Org key of the selling party. Join to dim_dealer.

      - name: org_key_initiator
        description: Org key of the party that initiated the transaction.

      - name: org_key_responder
        description: Org key of the responding party.

      - name: org_key_integrator
        description: Org key of the integrating party (e.g. DMS/EPC system).

      - name: amt_parts
        description: Parts amount on the transaction.

      - name: amt_labor
        description: Labor amount on the transaction.

      - name: amt_materials
        description: Materials amount on the transaction.

      - name: amt_sublet
        description: Sublet amount on the transaction.

      - name: amt_deductible
        description: Deductible amount.

      - name: amt_trx_subtotal
        description: Transaction subtotal before tax and shipping.

      - name: amt_trx_tax
        description: Tax amount on the transaction.

      - name: amt_trx_shipping
        description: Shipping amount on the transaction.

      - name: amt_trx_adjustment
        description: Adjustment amount on the transaction.

      - name: amt_trx_total
        description: Total transaction amount including tax, shipping, and adjustments.

      - name: currency_id
        description: Currency identifier. Join to ref_repairlink__currency.

      - name: trx_opened_at
        description: Timestamp when the transaction was opened.

      - name: trx_closed_at
        description: Timestamp when the transaction was closed.

      - name: trx_posted_at
        description: Timestamp when the transaction was posted.

      - name: trx_voided_at
        description: Timestamp when the transaction was voided. Null if not voided.

      - name: appointment_at
        description: Scheduled appointment timestamp.

      - name: complete_estimate_at
        description: Estimated completion timestamp.

      - name: complete_actual_at
        description: Actual completion timestamp.

      - name: customer_pickup_at
        description: Customer vehicle pickup timestamp.

      - name: vehicle_dropoff_at
        description: Vehicle drop-off timestamp.

      - name: repair_order_number
        description: External repair order number from the shop's DMS.

      - name: repair_order_type
        description: Repair order type code from the shop's DMS.

      - name: claim_number
        description: Insurance claim number, when the transaction is insurance-related.

      - name: insurance_company_name
        description: Insurance company name for insurance-related transactions.

      - name: external_insurance_id
        description: External insurance system identifier.

      - name: external_insurance_branch_id
        description: External insurance branch identifier.

      - name: supplement_level
        description: Supplement level for multi-supplement insurance transactions (0 = original).

      - name: transaction_event_log_id
        description: Event log identifier for audit trail.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_document
    description: >
      Document fact table at the document grain. One row per RepairLink document
      (source TRANSACTION_TRX_DOCUMENT). A transaction can have multiple documents;
      documents capture order/invoice details, shipping info, and financial totals at
      the document level. document_parent_id supports document hierarchies (e.g.
      original + return documents).

    columns:
      - name: document_id
        description: Primary key. Source DOCUMENTID.
        tests: [not_null, unique]

      - name: document_no
        description: Human-readable document number.

      - name: transaction_id
        description: Foreign key to fct_transaction.
        tests:
          - not_null
          - relationships:
              to: ref('fct_transaction')
              field: transaction_id

      - name: document_parent_id
        description: Parent document identifier for return/correction document hierarchies.

      - name: document_type_id
        description: Document type code (e.g. purchase order, invoice, return).
        tests: [not_null]

      - name: document_subtype_id
        description: Document sub-type code.

      - name: document_state_id
        description: Current lifecycle state of the document.

      - name: document_substate_id
        description: Sub-state within the lifecycle state.

      - name: status_id
        description: Numeric status code.

      - name: org_key_doc_source
        description: Org key of the document source party. Join to dim_dealer or dim_shop.

      - name: org_key_doc_target
        description: Org key of the document target party. Join to dim_dealer or dim_shop.

      - name: sourcing_type
        description: Sourcing type code for the document.

      - name: manufacturer_id
        description: Manufacturer associated with the document. Join to dim_manufacturer.

      - name: payment_method_id
        description: Payment method identifier.

      - name: amt_doc_subtotal
        description: Document subtotal before tax, shipping, and handling.

      - name: amt_doc_tax
        description: Tax amount on the document.

      - name: amt_doc_shipping
        description: Shipping amount on the document.

      - name: amt_doc_handling
        description: Handling amount on the document.

      - name: amt_doc_adjustment
        description: Adjustment amount on the document.

      - name: amt_doc_core_total
        description: Core charge total on the document.

      - name: amt_doc_total
        description: Total document amount.

      - name: doc_opened_at
        description: Timestamp when the document was opened.

      - name: doc_closed_at
        description: Timestamp when the document was closed.

      - name: doc_posted_at
        description: Timestamp when the document was posted.

      - name: doc_voided_at
        description: Timestamp when the document was voided. Null if not voided.

      - name: requested_delivery_at
        description: Requested delivery timestamp for the order.

      - name: ship_at
        description: Actual shipment timestamp.

      - name: ship_delivery_at
        description: Actual delivery timestamp.

      - name: ship_expected_at
        description: Expected delivery timestamp.

      - name: ship_tracking_no
        description: Carrier tracking number.

      - name: ship_carrier_type_id
        description: Carrier type identifier (e.g. UPS, FedEx).

      - name: ship_service_type_id
        description: Carrier service level identifier.

      - name: ship_bill_type_id
        description: Shipping billing type identifier.

      - name: ship_dropoff_type_id
        description: Drop-off location type identifier.

      - name: ship_strategy_type_id
        description: Shipping strategy type. Null — column absent from source table.

      - name: ship_weight
        description: Shipment weight.

      - name: ship_weight_uom_id
        description: Unit of measure for ship_weight.

      - name: ship_est_value
        description: Estimated declared value of the shipment.

      - name: ship_bill_act_shipper
        description: Actual shipper billing account.

      - name: ship_bill_act_recipient
        description: Actual recipient billing account.

      - name: ship_bill_act_third_party
        description: Third-party billing account.

      - name: document_event_log_id
        description: Event log identifier for audit trail.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_lineitem
    description: >
      Line item fact table at the line item grain. One row per line item
      (source TRANSACTION_TRX_LINEITEM). The most granular transaction entity —
      captures part identity, quantity, full unit and extended pricing across all
      price types, and shipping/package details. Joins upward to fct_document and
      fct_partpool; joins to dim_manufacturer for manufacturer context.

    columns:
      - name: line_item_id
        description: Primary key. Source LINEITEMID.
        tests: [not_null, unique]

      - name: line_item_no
        description: Human-readable line item number.

      - name: line_item_parent_id
        description: Parent line item identifier for hierarchical line item structures.

      - name: document_id
        description: Foreign key to fct_document.
        tests:
          - not_null
          - relationships:
              to: ref('fct_document')
              field: document_id

      - name: part_pool_id
        description: Foreign key to fct_partpool. Identifies the part being ordered.
        tests: [not_null]

      - name: line_item_type_id
        description: Line item type code.

      - name: line_item_sort
        description: Sort order for display within the document.

      - name: line_item_state_id
        description: Current lifecycle state of the line item.

      - name: line_item_substate_id
        description: Sub-state within the lifecycle state.

      - name: status_id
        description: Numeric status code.

      - name: item_name
        description: Part name / short description on the line item.

      - name: item_description
        description: Full part description on the line item.

      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.

      - name: unit_of_measure_id
        description: Unit of measure for quantity.

      - name: qty
        description: Ordered quantity.

      - name: qty_available
        description: Quantity available in the supplier's inventory at order time.

      - name: qty_on_hand
        description: Quantity on hand at the supplier at order time.

      - name: qty_on_order
        description: Quantity currently on order at the supplier.

      - name: qty_each_per_unit
        description: Number of individual pieces per unit.

      - name: amt_unit_cost
        description: Supplier cost per unit.

      - name: amt_unit_list
        description: List (MSRP) price per unit.

      - name: amt_unit_wholesale
        description: Wholesale price per unit.

      - name: amt_unit_trade
        description: Trade price per unit.

      - name: amt_unit_core
        description: Core charge per unit.

      - name: amt_unit_base
        description: Base price per unit.

      - name: amt_unit_net
        description: Net price per unit after adjustments.

      - name: amt_unit_final
        description: Final agreed price per unit.

      - name: amt_unit_adjust
        description: Per-unit adjustment amount.

      - name: amt_ext_cost
        description: Extended cost (amt_unit_cost × qty).

      - name: amt_ext_list
        description: Extended list price (amt_unit_list × qty).

      - name: amt_ext_wholesale
        description: Extended wholesale price (amt_unit_wholesale × qty).

      - name: amt_ext_trade
        description: Extended trade price (amt_unit_trade × qty).

      - name: amt_ext_core
        description: Extended core charge (amt_unit_core × qty).

      - name: amt_ext_base
        description: Extended base price (amt_unit_base × qty).

      - name: amt_ext_net
        description: Extended net price (amt_unit_net × qty).

      - name: amt_ext_final
        description: Extended final price (amt_unit_final × qty).

      - name: amt_ext_adjust
        description: Extended adjustment amount (amt_unit_adjust × qty).

      - name: amt_tax
        description: Tax amount on this line item.

      - name: amt_shipping
        description: Shipping charge on this line item.

      - name: part_pool_data_source
        description: Data source code that provided the part pool entry.

      - name: amt_baf_source
        description: BAF (Buyer Adjustment Factor) source amount.

      - name: part_avail_at
        description: Timestamp when the part will be available.

      - name: line_item_event_log_id
        description: Event log identifier for audit trail.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_partpool
    description: >
      Part pool fact table at the part pool grain. One row per part pool entry
      (source TRANSACTION_TRX_PARTPOOL). A part pool is the set of available part
      options presented to the buyer for a given repair need within a transaction.
      Captures multi-source part numbers, descriptions, and pricing tiers across
      DLR (dealer), APM (aftermarket), DMS, and EPC data sources. Joins upward to
      fct_transaction and to dim_manufacturer.

    columns:
      - name: part_pool_id
        description: Primary key. Source PARTPOOLID.
        tests: [not_null, unique]

      - name: transaction_id
        description: Foreign key to fct_transaction.
        tests:
          - not_null
          - relationships:
              to: ref('fct_transaction')
              field: transaction_id

      - name: part_pool_parent_id
        description: Parent part pool identifier for hierarchical part pool structures.

      - name: part_pool_type_id
        description: Part pool type code.

      - name: part_no
        description: Canonical part number.

      - name: part_description
        description: Canonical part description.

      - name: manufacturer_id
        description: Manufacturer identifier. Join to dim_manufacturer.

      - name: part_type_external_id
        description: External part type classification identifier.

      - name: part_type_internal_id
        description: Internal part type classification identifier.

      - name: status_id
        description: Numeric status code.

      - name: locale_code
        description: Locale code for the part pool entry.

      - name: part_no_dlr
        description: Dealer-sourced part number.

      - name: part_no_apm
        description: Aftermarket (APM) part number.

      - name: part_no_dms
        description: DMS-sourced part number.

      - name: part_no_epc
        description: EPC-sourced part number.

      - name: part_description_dlr
        description: Dealer-sourced part description.

      - name: part_description_apm
        description: Aftermarket (APM) part description.

      - name: part_description_dms
        description: DMS-sourced part description.

      - name: part_description_epc
        description: EPC-sourced part description.

      - name: part_usage
        description: Canonical part usage quantity.

      - name: part_usage_dlr
        description: Dealer-sourced part usage quantity.

      - name: part_usage_apm
        description: Aftermarket (APM) part usage quantity.

      - name: part_usage_dms
        description: DMS-sourced part usage quantity.

      - name: part_usage_epc
        description: EPC-sourced part usage quantity.

      - name: amt_unit_cost
        description: Canonical supplier cost per unit.

      - name: amt_unit_list
        description: Canonical list price per unit.

      - name: amt_unit_wholesale
        description: Canonical wholesale price per unit.

      - name: amt_unit_trade
        description: Canonical trade price per unit.

      - name: amt_unit_core
        description: Canonical core charge per unit.

      - name: amt_unit_cost_dlr
        description: Dealer-sourced cost per unit.

      - name: amt_unit_list_dlr
        description: Dealer-sourced list price per unit.

      - name: amt_unit_wholesale_dlr
        description: Dealer-sourced wholesale price per unit.

      - name: amt_unit_trade_dlr
        description: Dealer-sourced trade price per unit.

      - name: amt_unit_core_dlr
        description: Dealer-sourced core charge per unit.

      - name: amt_unit_cost_apm
        description: APM-sourced cost per unit.

      - name: amt_unit_list_apm
        description: APM-sourced list price per unit.

      - name: amt_unit_wholesale_apm
        description: APM-sourced wholesale price per unit.

      - name: amt_unit_trade_apm
        description: APM-sourced trade price per unit.

      - name: amt_unit_core_apm
        description: APM-sourced core charge per unit.

      - name: amt_unit_cost_dms
        description: DMS-sourced cost per unit.

      - name: amt_unit_list_dms
        description: DMS-sourced list price per unit.

      - name: amt_unit_wholesale_dms
        description: DMS-sourced wholesale price per unit.

      - name: amt_unit_trade_dms
        description: DMS-sourced trade price per unit.

      - name: amt_unit_core_dms
        description: DMS-sourced core charge per unit.

      - name: amt_unit_cost_epc
        description: EPC-sourced cost per unit.

      - name: amt_unit_list_epc
        description: EPC-sourced list price per unit.

      - name: amt_unit_wholesale_epc
        description: EPC-sourced wholesale price per unit.

      - name: amt_unit_trade_epc
        description: EPC-sourced trade price per unit.

      - name: amt_unit_core_epc
        description: EPC-sourced core charge per unit.

      - name: is_validate_pass
        description: Whether the part pool passed the validation check.

      - name: is_scrub_vin_pass
        description: Whether the part pool passed the VIN scrub check.

      - name: scrub_validated_at
        description: Timestamp when scrub validation was performed.

      - name: scrub_validity_mask
        description: Bitmask encoding the specific validation checks that were run.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.



  - name: fct_pma_lineitem
    description: >
      PMA (Parts Manufacturer Allowance) line item fact table. One row per
      (line_item_id, program_id) — a line item can qualify for multiple programs,
      so the composite key is the grain (source PMAPROGRAM_XRF_LINEITEM). Captures
      the program qualification outcome, reimbursement value, and match messaging
      for each PMA-qualifying line item. Modeled as a standalone fact, NOT an
      enrichment of fct_lineitem — join coverage is partial in both directions
      (see DAT-2586): only ~10.5% of fct_lineitem rows have a PMA record, and ~73%
      of PMA records have no matching fct_lineitem row. Always use LEFT joins when
      bridging between the two.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - line_item_id
            - program_id

    columns:
      - name: line_item_id
        description: >
          Part of composite PK. OPTIONAL foreign key to fct_lineitem — only ~10.5%
          of fct_lineitem rows have a PMA record; always LEFT join.
        tests: [not_null]

      - name: program_id
        description: Part of composite PK. Identifier of the PMA reimbursement program.
        tests: [not_null]

      - name: transaction_id
        description: Foreign key to fct_transaction.

      - name: comparison_result_id
        description: Identifier of the comparison result that produced the program match. Sparsely populated.

      - name: qualification_type_id
        description: Type of qualification applied when matching the line item to the program.

      - name: qualification_status_id
        description: Status of the qualification outcome. Sparsely populated.

      - name: status_id
        description: Numeric status code. Observed as 1 across all current data.

      - name: program_value
        description: >
          Program reimbursement value. Interpretation varies by program — may be a
          percentage (e.g. 0.15 = 15%) or a flat amount (e.g. 55.97). Interpret per program_id.

      - name: program_match_message
        description: Free-text message describing the match condition. Often null.

      - name: program_display_text
        description: Customer-facing text describing the reimbursement program and how to claim it.

      - name: part_num_oe_xref
        description: OE cross-reference part number for the matched part. Often null.

      - name: is_show_columns
        description: UI flag controlling whether program columns are shown. False across observed data.

      - name: created_at
        description: Record creation timestamp.
        tests: [not_null]

      - name: updated_at
        description: Record last update timestamp.

      - name: ingested_at
        description: Fivetran sync timestamp.
